version: "3.9"

services:
  certbot:
    image: certbot/certbot:latest
    container_name: pg-certbot
    volumes:
      - certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "
      trap exit TERM;
      certbot certonly --standalone --non-interactive --agree-tos
        --email ${CERT_EMAIL:?Set CERT_EMAIL in .env}
        -d ${PG_DOMAIN:?Set PG_DOMAIN in .env}
        --preferred-challenges http;
      while :; do
        certbot renew --quiet;
        sleep 12h;
      done"
    ports:
      - "80:80"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: shared-postgres
    restart: unless-stopped
    depends_on:
      - certbot
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-anythingllm}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD in .env}
      POSTGRES_DB: ${PG_DB:-anythingllm}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - certs:/etc/letsencrypt:ro
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./ssl-setup.sh:/docker-entrypoint-initdb.d/01-ssl-setup.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-anythingllm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - pgnet

  backup:
    build:
      context: ./backup
    container_name: pg-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${PG_USER:-anythingllm}
      PGPASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD in .env}
      PGDATABASE: ${PG_DB:-anythingllm}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?Set R2_ACCESS_KEY_ID in .env}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?Set R2_SECRET_ACCESS_KEY in .env}
      R2_ENDPOINT: ${R2_ENDPOINT:?Set R2_ENDPOINT in .env}
      R2_BUCKET: ${R2_BUCKET:?Set R2_BUCKET in .env}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    volumes:
      - pg_data:/var/lib/postgresql/data:ro
    networks:
      - pgnet

volumes:
  pg_data:
    driver: local
  certs:
    driver: local
  certbot_www:
    driver: local

networks:
  pgnet:
    driver: bridge
