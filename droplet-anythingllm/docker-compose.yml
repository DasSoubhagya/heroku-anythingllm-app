version: "3.9"

services:
  anythingllm:
    image: mintplexlabs/anythingllm:pg
    container_name: anythingllm
    ports:
      - "127.0.0.1:${ANYTHINGLLM_PORT:-3001}:3001"
    cap_add:
      - SYS_ADMIN
    volumes:
      - anythingllm_storage:/app/server/storage
      - ./anythingllm.env:/app/server/.env
    environment:
      - STORAGE_DIR=/app/server/storage
    env_file:
      - .env
    restart: unless-stopped

volumes:
  anythingllm_storage:
    driver: local
